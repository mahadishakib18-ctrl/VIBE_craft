<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Login - VibeCraft</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
      function validateLogin() {
  const email = document.getElementById('email').value.trim();
  const password = document.getElementById('password').value.trim();
  const emailError = document.getElementById('email-error');
  const passwordError = document.getElementById('password-error');
  const submitError = document.getElementById('submit-error');

  let valid = true;

  if (!email.match(/^[^\s@]+@[^\s@]+\.[^\s@]+$/)) {
    emailError.textContent = "Enter a valid email address.";
    valid = false;
  } else {
    emailError.textContent = "";
  }

  if (password.length < 6) {
    passwordError.textContent = "Password must be at least 6 characters.";
    valid = false;
  } else {
    passwordError.textContent = "";
  }

  if (!valid) {
    submitError.textContent = "❌ Fix the errors above before submitting.";
    submitError.style.color = "red";
  } else {
    submitError.textContent = "";
  }

  return valid;
}

  </script>
</head>
<body class="bg-gradient-to-b from-purple-100 via-blue-100 to-green-100 text-gray-800 min-h-screen flex flex-col">

  
  <!-- ✨ Navbar -->

  </nav>

  <!-- Login Form -->
  <main class="flex-grow flex items-center justify-center p-6">
    <div class="w-full max-w-md bg-white/80 backdrop-blur-md p-8 rounded-xl shadow-lg">
      <h2 class="text-3xl font-bold text-purple-800 mb-6 text-center">Login to VibeCraft</h2>

      <form action="login.php" method="POST" onsubmit="return validateLogin()" class="space-y-4">
        <div>
          <label for="email" class="block text-sm font-semibold">Email</label>
          <input type="email" name="email" id="email" required placeholder="you@example.com"
                 class="w-full px-4 py-2 border rounded focus:ring-2 focus:ring-purple-400">
          <small id="email-error" class="text-red-600 text-xs"></small>
        </div>

        <div>
          <label for="password" class="block text-sm font-semibold">Password</label>
          <input type="password" name="password" id="password" required placeholder="Your password"
                 class="w-full px-4 py-2 border rounded focus:ring-2 focus:ring-purple-400">
          <small id="password-error" class="text-red-600 text-xs"></small>
        </div>

        <div>
          <button type="submit"
                  class="w-full bg-purple-700 hover:bg-purple-800 text-white font-semibold py-2 rounded shadow-md transition">
            Login
          </button>
        </div>

        <p id="submit-error" class="text-center text-xs mt-2 text-gray-600"></p>
      </form>

      <p class="text-sm text-center mt-6">
        Don’t have an account?
